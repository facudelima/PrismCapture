name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 1.3.3)"
        required: true
        default: "1.3.3"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release zip
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismCapture-macos
          path: dist/PrismCapture-*-macos.zip
          if-no-files-found: error

      # Do NOT publish from CI: runners have no Apple Development cert, so the zip
      # would be ad-hoc and overwrite a locally signed release (breaks TCC).
      # Publish signed zips from the maintainer machine with:
      #   ./scripts/build-release.sh X.Y.Z && gh release upload ...
      - name: Skip unsigned GitHub Release publish
        run: |
          echo "CI artifact uploaded. Publish the signed zip from a Mac with the Development certificate."
          codesign -dv --verbose=2 dist/PrismCapture.app 2>&1 | grep -E 'Signature|TeamIdentifier|Authority' || true
          if codesign -dv dist/PrismCapture.app 2>&1 | grep -q 'Signature=adhoc'; then
            echo "Ad-hoc build — not attaching to the GitHub Release."
          fi
