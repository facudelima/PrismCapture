name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 1.1.1)"
        required: true
        default: "1.1.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release zip
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismCapture-macos
          path: dist/PrismCapture-*-macos.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: PrismCapture ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          files: dist/PrismCapture-*-macos.zip
          fail_on_unmatched_files: true
          body: |
            ## Descargar PrismCapture
            1. Bajá el `.zip` de abajo
            2. Descomprimí → `PrismCapture.app`
            3. Mové a **Aplicaciones**
            4. Primera vez: clic derecho → **Abrir**

            Requiere macOS 14+ y permiso de Grabación de pantalla.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
